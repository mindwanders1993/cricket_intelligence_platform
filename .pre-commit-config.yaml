repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  # ✅ pytest via local hook — uses your project's own venv/conda env
  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests only)
        language: python          # ← changed from system
        additional_dependencies:
          - pytest
          - pytest-cov
        entry: pytest tests/unit/ --tb=short -q
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
