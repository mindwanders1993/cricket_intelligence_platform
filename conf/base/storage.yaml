# conf/base/storage.yaml
# Default storage configuration for the Cricket Intelligence Platform.
# Values here are the dev defaults. Override via .env or environment variables.
# All MINIO_* and ICEBERG_* env vars take priority over these values.

minio:
  endpoint: "${MINIO_S3_ENDPOINT:-http://minio:9000}"
  console_url: "http://localhost:9001"
  root_user: "cricket_admin"
  region: "us-east-1"
  path_style: true
  use_ssl: false

  # Three buckets only — named by purpose, not by tech.
  buckets:
    source_files: "cricket-source-files"  # raw downloads from cricsheet.org
    lakehouse: "cricket-lakehouse"        # all Iceberg tables (bronze/silver/gold)
    ml_models: "cricket-ml-models"        # MLflow run artifacts + trained models

  # Folders inside cricket-source-files.
  prefixes:
    match_data_zip: "match_data/zip"             # all_json.zip + future incremental zips
    match_data_json: "match_data/json"           # extracted match JSON files
    people_and_names_csv: "people_and_names/csv" # people.csv + names.csv

iceberg:
  rest_uri: "http://localhost:8181"
  lakehouse_bucket: "cricket-lakehouse"
  catalog_name: "cricket"
  namespaces:
    bronze: "bronze"
    silver: "silver"
    gold: "gold"

postgres:
  host: "${POSTGRES_HOST:-postgres}"
  port: 5432
  db: "cricket_platform"
  pool_size: 5
  max_overflow: 10
  connect_timeout: 10
