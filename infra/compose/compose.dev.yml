# infra/compose/compose.dev.yml
# Development overrides for the Cricket Intelligence Platform.
# Usage: docker compose -f infra/compose/compose.base.yml -f infra/compose/compose.dev.yml up
# Extends base.yml with: hot-reload mounts, MLflow, bucket bootstrapper.

services:

  # Override: mount platform source code live into airflow containers
  airflow-webserver:
    environment:
      CIP_REPO_ROOT: /opt/airflow
      PYTHONPATH: /opt/airflow/src
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        pydantic-settings==2.14.1
        psycopg2-binary==2.9.12
        httpx==0.28.1
        boto3==1.43.6
        structlog==24.4.0
        python-dotenv==1.2.2
        PyYAML==6.0.3
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../conf:/opt/airflow/conf
      - airflow_logs:/opt/airflow/logs

  airflow-scheduler:
    environment:
      CIP_REPO_ROOT: /opt/airflow
      PYTHONPATH: /opt/airflow/src
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        pydantic-settings==2.14.1
        psycopg2-binary==2.9.12
        httpx==0.28.1
        boto3==1.43.6
        structlog==24.4.0
        python-dotenv==1.2.2
        PyYAML==6.0.3
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../conf:/opt/airflow/conf
      - airflow_logs:/opt/airflow/logs

  # ---------------------------------------------------------------------------
  # MinIO bucket bootstrapper — runs once, creates all required buckets/prefixes.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        /usr/bin/mc alias set local http://minio:9000 \
          ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        /usr/bin/mc mb --ignore-existing local/cricket-landing &&
        /usr/bin/mc mb --ignore-existing local/cricket-bronze &&
        /usr/bin/mc mb --ignore-existing local/cricket-silver &&
        /usr/bin/mc mb --ignore-existing local/cricket-gold &&
        /usr/bin/mc mb --ignore-existing local/iceberg-warehouse &&
        /usr/bin/mc mb --ignore-existing local/mlflow-artifacts &&
        /usr/bin/mc put /dev/null local/cricket-landing/raw_zips/.keep &&
        /usr/bin/mc put /dev/null local/cricket-landing/extracted_json/.keep &&
        /usr/bin/mc put /dev/null local/cricket-landing/register_csv/.keep &&
        echo "✅ MinIO buckets and prefixes initialized."
    restart: on-failure

  # ---------------------------------------------------------------------------
  # MLflow Tracking Server
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://${MINIO_HOST:-minio}:9000
      AWS_S3_PATH_STYLE_ACCESS: "true"
    command: >
      mlflow server
        --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB}
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # pgAdmin — PostgreSQL web UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.6
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cricket-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ../../infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"

volumes:
  airflow_logs:
  minio_data:
  postgres_data:
  pgadmin_data:
