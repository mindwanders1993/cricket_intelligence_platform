# infra/compose/compose.dev.yml
# Development overrides for the Cricket Intelligence Platform.
# Usage: docker compose -f infra/compose/compose.base.yml -f infra/compose/compose.dev.yml up
# Extends base.yml with: hot-reload mounts, MLflow, bucket bootstrapper.

services:

  # Override: build a custom image with Java + PySpark, mount source live.
  # Run `make build-airflow` (or `docker compose build`) once after pulling,
  # then `make up` as normal. The custom image replaces _PIP_ADDITIONAL_REQUIREMENTS.
  airflow-webserver:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    environment:
      CIP_REPO_ROOT: /opt/airflow
      PYTHONPATH: /opt/airflow/src
      JAVA_HOME: /usr/lib/jvm/default-java
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../conf:/opt/airflow/conf
      - ../../models:/opt/airflow/models
      - airflow_logs:/opt/airflow/logs
      - ../../storage:/opt/airflow/storage

  airflow-scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    environment:
      CIP_REPO_ROOT: /opt/airflow
      PYTHONPATH: /opt/airflow/src
      JAVA_HOME: /usr/lib/jvm/default-java
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../conf:/opt/airflow/conf
      - ../../models:/opt/airflow/models
      - airflow_logs:/opt/airflow/logs
      - ../../storage:/opt/airflow/storage

  # ---------------------------------------------------------------------------
  # MinIO bucket bootstrapper — runs once, creates all required buckets/prefixes.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        /usr/bin/mc alias set local http://minio:9000 \
          ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        /usr/bin/mc mb --ignore-existing local/cricket-source-files &&
        /usr/bin/mc mb --ignore-existing local/cricket-lakehouse &&
        /usr/bin/mc mb --ignore-existing local/cricket-ml-models &&
        /usr/bin/mc put /dev/null local/cricket-source-files/match_data/zip/.keep &&
        /usr/bin/mc put /dev/null local/cricket-source-files/match_data/json/.keep &&
        /usr/bin/mc put /dev/null local/cricket-source-files/people_and_names/csv/.keep &&
        echo "✅ MinIO buckets and prefixes initialized."
    restart: on-failure

  # ---------------------------------------------------------------------------
  # MLflow Tracking Server
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://cricket-ml-models/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://${MINIO_HOST:-minio}:9000
      AWS_S3_PATH_STYLE_ACCESS: "true"
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root s3://cricket-ml-models/
        --host 0.0.0.0
        --port 5000
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Metabase plugin bootstrapper — downloads the DuckDB community driver JAR
  # into a named volume on first run. The driver is not bundled with Metabase OSS.
  # Pinned to 1.5.2.0 which targets DuckDB 1.5.2 (matches our duckdb python lib).
  # ---------------------------------------------------------------------------
  metabase-init:
    image: alpine:3.20
    volumes:
      - metabase_plugins:/plugins
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        if [ ! -f /plugins/duckdb.metabase-driver.jar ]; then
          apk add --no-cache curl &&
          curl -fsSL -o /plugins/duckdb.metabase-driver.jar \
            https://github.com/motherduckdb/metabase_duckdb_driver/releases/download/1.5.2.0/duckdb.metabase-driver.jar
          echo "✅ DuckDB driver downloaded ($(stat -c%s /plugins/duckdb.metabase-driver.jar) bytes)"
        else
          echo "✅ DuckDB driver already present"
        fi
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Metabase — BI / dashboards over the Gold layer.
  # Reads cricket.duckdb in read-only mode (DuckDB allows multiple concurrent
  # readers, but only one writer). Stop Metabase before running the Gold DAG
  # that rewrites the file — see docs/runbooks/dashboard.md.
  # ---------------------------------------------------------------------------
  metabase:
    build:
      context: ../..
      dockerfile: infra/docker/metabase/Dockerfile
      args:
        METABASE_VERSION: v0.60.6
    image: cricket-metabase:v0.60.6
    restart: unless-stopped
    depends_on:
      metabase-init:
        condition: service_completed_successfully
    environment:
      MB_PLUGINS_DIR: /plugins
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: Asia/Kolkata
      MB_SITE_NAME: "Cricket Intelligence Platform"
    volumes:
      - metabase_data:/metabase-data
      # /plugins must be writable: Metabase extracts driver JARs at startup.
      - metabase_plugins:/plugins
      - ../../storage/duckdb:/data:ro
    ports:
      - "${METABASE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # pgAdmin — PostgreSQL web UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.6
    restart: unless-stopped
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cricket-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/setup-pgpass.sh"]
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ../../infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ../../infra/pgadmin/setup-pgpass.sh:/setup-pgpass.sh:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"

volumes:
  airflow_logs:
  minio_data:
  postgres_data:
  pgadmin_data:
  mlflow_data:
  metabase_data:
  metabase_plugins:
  # cricket_storage removed — now a bind mount at ../../storage so DuckDB is host-accessible
